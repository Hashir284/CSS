<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton Cradle</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#191825;
        font-family:sans-serif;
    }

    .cradle{
        position:relative;
        width:350px;
        height:300px;
        border-top:10px solid #865dff;
        display:flex;
        justify-content:space-between;
        padding:0 25px;
    }

    .ball{
        position:relative;
        width:2px;
        height:180px;
        background:#865dff;
        transform-origin: top;
    }

    .ball::after{
        content:"";
        position:absolute;
        bottom:-25px;
        left:50%;
        transform:translateX(-50%);
        width:50px;
        height:50px;
        background:#865dff;
        border-radius:50%;
    }

    /* Left ball swing */
    .ball:first-child{
        animation: leftSwing 1.4s ease-in-out infinite;
    }

    @keyframes leftSwing{
        0%{ transform: rotate(0deg); }
        25%{ transform: rotate(-30deg); }
        50%{ transform: rotate(0deg); }
        100%{ transform: rotate(0deg); }
    }

    /* Right ball swing */
    .ball:last-child{
        animation: rightSwing 1.4s ease-in-out infinite;
        animation-delay:0.7s;
    }

    @keyframes rightSwing{
        0%{ transform: rotate(0deg); }
        50%{ transform: rotate(0deg); }
        75%{ transform: rotate(30deg); }
        100%{ transform: rotate(0deg); }
    }

</style>
</head>
<body>

<div class="cradle">
    <div class="ball"></div>
    <div class="ball"></div>
    <div class="ball"></div>
    <div class="ball"></div>
    <div class="ball"></div>
</div>

</body>
</html>
