<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row g-3">
        <!-- Column 1: Auto width -->
        <div class="col bg-primary text-white p-3">
            <h4>Column 1</h4>
            <p>Yeh column auto adjust hota hai remaining space ke hisaab se.</p>
        </div>

        <!-- Column 2: 6 units wide -->
        <div class="col-6 bg-success text-white p-3">
            <h4>Column 2</h4>
            <p>Yeh column 12-grid system mein 6 units le raha hai (half width).</p>
        </div>

        <!-- Column 3: 4 units wide on medium screens and up -->
        <div class="col-md-4 bg-warning text-dark p-3">
            <h4>Column 3</h4>
            <p>Medium screens aur upar 4 units lega, small screens pe auto adjust hoga.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
